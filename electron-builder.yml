appId: com.psdimagegenerator.app
productName: PSD Image Generator
publish: never
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
  - '!**/*.map'
asarUnpack:
  - '**/node_modules/sharp/**/*'
  - '**/node_modules/@img/**/*'
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
