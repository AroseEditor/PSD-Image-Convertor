name: Release

# Builds the Windows NSIS installer and publishes it as a draft GitHub Release.
#
# Runs automatically on:
#   - every push to main — builds and updates a single rolling "dev-latest"
#     draft release (each push overwrites it in place, so drafts don't pile up)
#   - pushing a version tag like "v1.2.0" — builds and drafts a proper
#     versioned release for that tag
#   - manual dispatch from the Actions tab, with a tag you supply
#
# The release is always a DRAFT — nothing goes public until a maintainer
# reviews it on the Releases page and clicks "Publish release".

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, so auto-generated release notes can list every commit/PR since the last tag

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build the NSIS installer
        run: npm run dist

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "title=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            echo "name=$tag" >> "$GITHUB_OUTPUT"
            echo "title=$tag" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            sha="${GITHUB_SHA:0:7}"
            echo "name=dev-latest" >> "$GITHUB_OUTPUT"
            echo "title=Development build ($sha)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create/update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.title }}
          draft: true
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
