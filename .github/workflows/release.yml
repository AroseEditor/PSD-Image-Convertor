name: Release

# Builds the Windows NSIS installer and publishes it as a draft GitHub Release.
#
# Trigger it either by:
#   - pushing a tag like "v1.2.0" (git tag v1.2.0 && git push origin v1.2.0), or
#   - running this workflow manually from the Actions tab and supplying a tag.
#
# The release is created as a DRAFT — nothing goes public until a maintainer
# reviews it on the Releases page and clicks "Publish release".

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, so auto-generated release notes can list every commit/PR since the last tag

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build the NSIS installer
        run: npm run dist

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: true
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
